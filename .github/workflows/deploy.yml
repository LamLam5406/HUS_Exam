name: Deploy React App

on:
  push:
    branches: ["main"] # Chạy khi bạn push code lên nhánh main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./3-react-frontend # Chỉ định thư mục làm việc là 3-react-frontend
        
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './3-react-frontend/package-lock.json'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './3-react-frontend/dist' # Trỏ tới thư mục dist sau khi build xong
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4