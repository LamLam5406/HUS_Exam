<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Scraper Control</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            width: 250px;
            padding: 16px;
            margin: 0;
            background-color: #f8f9fa;
            color: #333;
        }
        h3 {
            margin-top: 0;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            padding-bottom: 12px;
            border-bottom: 1px solid #e9ecef;
        }
        /* Buttons Styling */
        .btn-start, .btn-stop {
            width: 100%;
            padding: 10px;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-start { background-color: #0066cc; }
        .btn-stop { background-color: #dc3545; margin-top: 8px; }
        .btn-stop:hover { background-color: #c82333; }
        .btn-disabled { background-color: #cccccc !important; cursor: not-allowed; }
        
        #status {
            margin-top: 12px;
            font-size: 13px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h3>Data Ingestion</h3>
    <button id="startBtn" class="btn-start">Bắt đầu thu thập</button>
    <button id="stopBtn" class="btn-stop">Dừng thu thập</button>
    <div id="status">Trạng thái: Đang chờ...</div>

    <script src="script.js"></script>
</body>
</html>
